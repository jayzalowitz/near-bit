name: Launch Evidence Bundle

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Readiness gate mode"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - full
      include_fuzz:
        description: "Include fuzz smoke runs in readiness gate"
        required: true
        default: false
        type: boolean
      require_go:
        description: "Require GO criteria from checklist"
        required: true
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  bundle:
    name: Generate launch evidence bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit (full mode only)
        if: ${{ inputs.mode == 'full' }}
        run: cargo install cargo-audit --locked

      - name: Install Rust nightly + cargo-fuzz (include_fuzz=true)
        if: ${{ inputs.include_fuzz }}
        run: |
          rustup toolchain install nightly
          cargo install cargo-fuzz --locked

      - name: Generate launch evidence bundle
        shell: bash
        run: |
          set -euo pipefail
          EXTRA_ARGS=()
          if [[ "${{ inputs.include_fuzz }}" == "true" ]]; then
            EXTRA_ARGS+=(--include-fuzz)
          fi
          if [[ "${{ inputs.require_go }}" == "true" ]]; then
            EXTRA_ARGS+=(--require-go)
          fi
          ./scripts/launch/generate_evidence_bundle.sh --mode "${{ inputs.mode }}" --out-dir "${RUNNER_TEMP}/launch-readiness" "${EXTRA_ARGS[@]}"

      - name: Upload evidence bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: launch-evidence-${{ inputs.mode }}-${{ github.sha }}
          path: ${{ runner.temp }}/launch-readiness
          if-no-files-found: error
