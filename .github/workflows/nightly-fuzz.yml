name: Nightly Fuzz

on:
  schedule:
    # Run every 6 hours; each run fuzzes each target for ~6h.
    # This yields ~24h cumulative fuzz time per target per day.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      max_total_time:
        description: "Per-target fuzz time in seconds"
        required: false
        default: "21600"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: nightly-fuzz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fuzz:
    name: "Fuzz: ${{ matrix.target }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate_path: near-account-id
            target: fuzz_account_id_parse
          - crate_path: bitinfinity-btcrpc
            target: fuzz_rpc_parse
          - crate_path: bitinfinity-btcrpc
            target: fuzz_tx_hex
          - crate_path: bitinfinity-btcrpc
            target: fuzz_tx_translator
          - crate_path: bitinfinity-btcrpc
            target: fuzz_amount_math
          - crate_path: bitinfinity-tools
            target: fuzz_patoshi_csv
          - crate_path: nearcore/core/crypto
            target: fuzz_secp256k1_recover
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-nightly-fuzz-${{ hashFiles('**/Cargo.lock') }}

      - name: Run fuzz target
        shell: bash
        run: |
          set -euo pipefail
          DURATION="${{ github.event.inputs.max_total_time }}"
          if [ -z "${DURATION}" ]; then
            DURATION="21600"
          fi
          cd "${{ matrix.crate_path }}"
          cargo fuzz run "${{ matrix.target }}" -- -max_total_time="${DURATION}" -timeout=10
