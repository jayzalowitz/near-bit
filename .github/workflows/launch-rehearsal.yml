name: Launch Rehearsal

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Rehearsal mode"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - full
      include_fuzz:
        description: "Include fuzz smoke runs"
        required: true
        default: false
        type: boolean
      check_nightly_fuzz_health:
        description: "Enforce 7-day nightly fuzz health gate"
        required: true
        default: false
        type: boolean
      nightly_fuzz_branch:
        description: "Branch used by nightly fuzz health check"
        required: true
        default: "main"
        type: string
      nightly_fuzz_workflow:
        description: "Workflow name used by nightly fuzz health check"
        required: true
        default: "Nightly Fuzz"
        type: string
      nightly_fuzz_window_days:
        description: "Lookback window in days for nightly fuzz health"
        required: true
        default: "7"
        type: string
      nightly_fuzz_min_runs:
        description: "Minimum required runs in nightly fuzz lookback window"
        required: true
        default: "1"
        type: string
      nightly_fuzz_max_runs:
        description: "Max runs fetched from GitHub API for nightly fuzz health"
        required: true
        default: "200"
        type: string
      nightly_fuzz_allow_in_progress:
        description: "Allow in-progress nightly fuzz runs"
        required: true
        default: false
        type: boolean
      skip_issue1_goal_checks:
        description: "Skip Issue #1 target suites in readiness gate"
        required: true
        default: false
        type: boolean
      require_go:
        description: "Require GO checklist criteria"
        required: true
        default: false
        type: boolean
      release_manifest:
        description: "Release manifest behavior"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - include
          - skip
      release_manifest_skip_build:
        description: "Skip release build when generating release manifest"
        required: true
        default: false
        type: boolean
      cargo_target_dir:
        description: "Optional Cargo target directory override"
        required: false
        default: ""
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rehearsal:
    name: Run launch rehearsal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit (mode=full)
        if: ${{ inputs.mode == 'full' }}
        run: cargo install cargo-audit --locked

      - name: Install Rust nightly + cargo-fuzz (include_fuzz=true)
        if: ${{ inputs.include_fuzz }}
        run: |
          rustup toolchain install nightly
          cargo install cargo-fuzz --locked

      - name: Run launch rehearsal
        shell: bash
        run: |
          set -euo pipefail
          EXTRA_ARGS=()
          if [[ "${{ inputs.include_fuzz }}" == "true" ]]; then
            EXTRA_ARGS+=(--include-fuzz)
          fi
          if [[ "${{ inputs.check_nightly_fuzz_health }}" == "true" ]]; then
            EXTRA_ARGS+=(
              --check-nightly-fuzz-health
              --nightly-fuzz-branch "${{ inputs.nightly_fuzz_branch }}"
              --nightly-fuzz-workflow "${{ inputs.nightly_fuzz_workflow }}"
              --nightly-fuzz-window-days "${{ inputs.nightly_fuzz_window_days }}"
              --nightly-fuzz-min-runs "${{ inputs.nightly_fuzz_min_runs }}"
              --nightly-fuzz-max-runs "${{ inputs.nightly_fuzz_max_runs }}"
            )
            if [[ "${{ inputs.nightly_fuzz_allow_in_progress }}" == "true" ]]; then
              EXTRA_ARGS+=(--nightly-fuzz-allow-in-progress)
            fi
          fi
          if [[ "${{ inputs.skip_issue1_goal_checks }}" == "true" ]]; then
            EXTRA_ARGS+=(--skip-issue1-goal-checks)
          fi
          if [[ "${{ inputs.require_go }}" == "true" ]]; then
            EXTRA_ARGS+=(--require-go)
          fi
          case "${{ inputs.release_manifest }}" in
            include)
              EXTRA_ARGS+=(--include-release-manifest)
              ;;
            skip)
              EXTRA_ARGS+=(--skip-release-manifest)
              ;;
            auto)
              ;;
            *)
              echo "Unknown release_manifest input: ${{ inputs.release_manifest }}" >&2
              exit 1
              ;;
          esac
          if [[ "${{ inputs.release_manifest_skip_build }}" == "true" ]]; then
            if [[ "${{ inputs.release_manifest }}" == "skip" ]]; then
              echo "release_manifest_skip_build=true cannot be combined with release_manifest=skip" >&2
              exit 1
            fi
            EXTRA_ARGS+=(--release-manifest-skip-build)
          fi
          if [[ -n "${{ inputs.cargo_target_dir }}" ]]; then
            EXTRA_ARGS+=(--cargo-target-dir "${{ inputs.cargo_target_dir }}")
          fi
          ./scripts/launch/run_launch_rehearsal.sh --mode "${{ inputs.mode }}" --operator "${{ github.actor }}" --out-dir "${RUNNER_TEMP}/launch-rehearsals" "${EXTRA_ARGS[@]}"

      - name: Upload rehearsal artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launch-rehearsal-${{ inputs.mode }}-${{ github.sha }}
          path: ${{ runner.temp }}/launch-rehearsals
          if-no-files-found: error
