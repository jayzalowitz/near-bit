name: Launch Rehearsal

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Rehearsal mode"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - full
      include_fuzz:
        description: "Include fuzz smoke runs"
        required: true
        default: false
        type: boolean
      require_go:
        description: "Require GO checklist criteria"
        required: true
        default: false
        type: boolean
      release_manifest:
        description: "Release manifest behavior"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - include
          - skip
      release_manifest_skip_build:
        description: "Skip release build when generating release manifest"
        required: true
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rehearsal:
    name: Run launch rehearsal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit (mode=full)
        if: ${{ inputs.mode == 'full' }}
        run: cargo install cargo-audit --locked

      - name: Install Rust nightly + cargo-fuzz (include_fuzz=true)
        if: ${{ inputs.include_fuzz }}
        run: |
          rustup toolchain install nightly
          cargo install cargo-fuzz --locked

      - name: Run launch rehearsal
        shell: bash
        run: |
          set -euo pipefail
          EXTRA_ARGS=()
          if [[ "${{ inputs.include_fuzz }}" == "true" ]]; then
            EXTRA_ARGS+=(--include-fuzz)
          fi
          if [[ "${{ inputs.require_go }}" == "true" ]]; then
            EXTRA_ARGS+=(--require-go)
          fi
          case "${{ inputs.release_manifest }}" in
            include)
              EXTRA_ARGS+=(--include-release-manifest)
              ;;
            skip)
              EXTRA_ARGS+=(--skip-release-manifest)
              ;;
            auto)
              ;;
            *)
              echo "Unknown release_manifest input: ${{ inputs.release_manifest }}" >&2
              exit 1
              ;;
          esac
          if [[ "${{ inputs.release_manifest_skip_build }}" == "true" ]]; then
            if [[ "${{ inputs.release_manifest }}" == "skip" ]]; then
              echo "release_manifest_skip_build=true cannot be combined with release_manifest=skip" >&2
              exit 1
            fi
            EXTRA_ARGS+=(--release-manifest-skip-build)
          fi
          ./scripts/launch/run_launch_rehearsal.sh --mode "${{ inputs.mode }}" --out-dir "${RUNNER_TEMP}/launch-rehearsals" "${EXTRA_ARGS[@]}"

      - name: Upload rehearsal artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launch-rehearsal-${{ inputs.mode }}-${{ github.sha }}
          path: ${{ runner.temp }}/launch-rehearsals
          if-no-files-found: error
